name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch so PR pushes don't queue up
# duplicate jobs. Each run still emits a status check.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      # `vp install` follows the package manager declared in package.json
      # (npm@11). Cache the Vite+ task graph so reruns on the same branch
      # are fast.
      - run: vp install

      # React Router 7 generates per-route type declarations (./+types/*)
      # at codegen time. `vp check` doesn't know about this, so run it
      # explicitly before lint/typecheck.
      - run: vp dlx react-router typegen

      - run: vp check
      - run: vp test run

  build:
    name: production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - run: vp install
      - run: vp dlx react-router typegen
      - run: vp build
